name: Nightly Cleanup Audit

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find dead files
        id: audit
        run: |
          {
            echo "findings<<EOF"
            echo "## Dead file audit ($(date +%Y-%m-%d))"
            echo ""

            # .DS_Store
            DS=$(find . -name ".DS_Store" -not -path "./node_modules/*" -not -path "./.git/*" | wc -l)
            [ "$DS" -gt 0 ] && echo "- $DS .DS_Store files found"

            # Build artifacts tracked
            TSB=$(git ls-files | grep -c tsbuildinfo || true)
            [ "$TSB" -gt 0 ] && echo "- $TSB .tsbuildinfo files tracked in git"

            # Empty directories
            EMPTY=$(find . -type d -empty -not -path "./node_modules/*" -not -path "./.git/*" | wc -l)
            [ "$EMPTY" -gt 0 ] && echo "- $EMPTY empty directories"

            # Stub files (under 5 lines)
            echo ""
            echo "## Stub files (< 5 lines):"
            find docs -name "*.md" -type f 2>/dev/null | while read f; do
              LINES=$(wc -l < "$f")
              [ "$LINES" -lt 5 ] && echo "- $f ($LINES lines)"
            done

            # Dated handoffs count
            echo ""
            echo "## Handoff history:"
            echo "Check ~/.claude/projects/.../memory/ for dated handoff files"

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Open issue if findings
        uses: actions/github-script@v7
        with:
          script: |
            const findings = `${{ steps.audit.outputs.findings }}`;
            if (findings.includes('found') || findings.includes('tracked') || findings.includes('(') ) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Nightly cleanup findings — ${new Date().toISOString().split('T')[0]}`,
                body: findings,
                labels: ['cleanup', 'automated']
              });
            }
