name: Bug
description: Something is broken
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      # <!-- TEMPLATE: customize areas for your project -->
      options:
        - frontend
        - backend
        - infra
        - database
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
